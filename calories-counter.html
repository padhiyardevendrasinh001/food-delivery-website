<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calories Counter | King's Platter</title>

<style>

body{
font-family: 'Segoe UI', Arial, sans-serif;
margin:0;
background:#ffffff;
color:#333;
}

/* HEADER */

header{
background:linear-gradient(90deg,#d4af37,#b8962e);
color:white;
text-align:center;
padding:25px;
font-size:28px;
font-weight:bold;
letter-spacing:1px;
}

/* MAIN CONTAINER */

.container{
width:420px;
margin:70px auto;
background:white;
padding:35px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
text-align:center;
border:2px solid #d4af37;
}

/* TITLE */

h2{
margin-bottom:20px;
color:#b8962e;
}

/* SELECT BOX */

select{
width:100%;
padding:12px;
margin:15px 0;
border-radius:8px;
border:2px solid #d4af37;
font-size:15px;
background:#fff;
}

/* BUTTON */

button{
width:100%;
padding:12px;
background:#d4af37;
border:none;
color:white;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#b8962e;
transform:scale(1.05);
}

/* RESULT */

.result{
margin-top:25px;
font-size:22px;
font-weight:bold;
color:#d4af37;
}

/* FOOD ICONS */

.food-icons{
display:flex;
justify-content:space-around;
margin-bottom:20px;
font-size:28px;
}

/* FOOTER */

footer{
margin-top:60px;
background:#111;
color:white;
text-align:center;
padding:15px;
}

</style>

</head>

<body>

<header>
👑 King's Platter Calories Counter
</header>

<div class="container">

<div class="food-icons">
🍔 🍕 🍝 🍗
</div>

<h2>Select Your Food</h2>

<select id="food">
<option value="450">Double Beef Burger</option>
<option value="320">Chicken Roll</option>
<option value="380">Italian Spaghetti</option>
<option value="500">Veggie Pizza</option>
<option value="420">Fried Chicken</option>
<option value="350">Sub Sandwich</option>
</select>

<button onclick="calculateCalories()">Calculate Calories</button>

<div class="result" id="result"></div>

</div>

<footer>
© 2026 King's Platter | Royal Taste Delivered
</footer>

<script>

function calculateCalories(){

let food = document.getElementById("food").value;

document.getElementById("result").innerHTML =
"🔥 Estimated Calories: " + food + " kcal";

}

</script>

</body>
</html>

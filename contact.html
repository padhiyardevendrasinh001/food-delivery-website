<!DOCTYPE html>
<html>
<head>
<title>Contact Us | King's Platter</title>

<style>
body{
font-family:Arial;
background:#f7f7f7;
margin:0;
}

header{
background:#222;
color:white;
text-align:center;
padding:20px;
}

.container{
width:400px;
margin:50px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input, textarea{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px 20px;
background:#ff6b00;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

footer{
background:#222;
color:white;
text-align:center;
padding:15px;
margin-top:40px;
}
</style>

</head>

<body>

<header>
<h1>Contact Us</h1>
</header>

<div class="container">

<input type="text" id="name" placeholder="Your Name">
<input type="email" id="email" placeholder="Your Email">
<textarea id="message" placeholder="Your Message"></textarea>

<button onclick="sendMessage()">Send Message</button>

</div>

<footer>
© 2026 King's Platter
</footer>

<script>
function sendMessage(){
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const message = document.getElementById("message").value;

  if(!name || !email || !message){
    alert("Please fill all fields");
    return;
  }

  fetch("http://localhost:4000/contacts", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ name, email, message })
  })
  .then(res => res.json())
  .then(data => {
    alert("Your message has been submitted. Have a nice day 😊");

    // clear form
    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
    document.getElementById("message").value = "";

    // ✅ REDIRECT AFTER 1 SECOND
  setTimeout(() => {
    window.location.href = "index2.html";
  }, 1000);
  })
  .catch(err => {
    console.error(err);
    alert("Error sending message");
  });
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Account | King's Platter</title>

<style>
body{
font-family:Arial;
background:#f7f7f7;
margin:0;
}

header{
background:#222;
color:white;
text-align:center;
padding:20px;
}

.container{
width:350px;
margin:50px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#ff6b00;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

footer{
text-align:center;
padding:15px;
background:#222;
color:white;
margin-top:40px;
}
</style>

</head>

<body>

<header>
<h1>My Account</h1>
</header>

<div class="container">

<h2>Login</h2>

<input type="email" placeholder="Enter Email">

<input type="password" placeholder="Enter Password">

<button>Login</button>

<p>Don't have an account? Sign up</p>

</div>

<footer>
© 2026 King's Platter
</footer>

</body>
</html>
